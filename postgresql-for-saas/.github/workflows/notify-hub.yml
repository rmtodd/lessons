name: Notify hub

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hub index rebuild
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.HUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/rmtodd/rmtodd.github.io/dispatches \
            -d '{"event_type":"pages-updated","client_payload":{"repo":"postgresql-for-saas"}}'
